# /etc/asound.conf — DVR ALSA configuration
# TC358743 outputs HDMI audio on I2S (typically card 1 or 2 on RPi)
# Adjust card index to match 'aplay -l' output

# Name the I2S capture device for easy reference
pcm.tc358743_capture {
    type hw
    card 1        # change if aplay -l shows a different card number
    device 0
    format S32_LE
    rate 48000
    channels 2
}

# Convenience alias used by the DVR app
pcm.dvr_in {
    type plug
    slave {
        pcm "tc358743_capture"
        format S32_LE
        rate 48000
        channels 2
    }
}

# Default capture — DVR app uses 'default' for alsasrc
pcm.!default {
    type asym
    capture.pcm "dvr_in"
    playback.pcm {
        type hw
        card 0
        device 0
    }
}

ctl.!default {
    type hw
    card 0
}
