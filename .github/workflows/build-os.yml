name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test-and-build:
    name: Test & Build Application
    # Native arm64 hosted runner (free for public repos) - this repo's
    # Alpine container is used for a matching musl/package environment,
    # not for cross-arch emulation, so building it on a host that's
    # already aarch64 skips QEMU translation entirely for the heaviest
    # job in the pipeline (a ~250-crate dependency compile).
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      # `dvr_app/target` is under the workspace, which IS bind-mounted into
      # the container below, so this half of the cache is real. The
      # ~/.cargo paths are NOT mounted into the container by themselves
      # (see the docker run step) - without that mount this cache is a
      # no-op and every run silently re-downloads the entire crate registry.
      - name: Cache Cargo registry, git sources, and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            dvr_app/target
          key: ${{ runner.os }}-arm64-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      # Test and build in a single container/profile pass: `cargo test
      # --release` compiles the full dependency tree once, and the
      # following `cargo build --release` reuses those already-compiled
      # dependency artifacts (only dvr_app's own crate needs a second,
      # much cheaper compile without the test cfg). Running both stages
      # as one job also means the target/ dir is shared directly on disk
      # instead of relying on a cross-job cache round-trip to line up.
      - name: Test and build Rust App (aarch64, release)
        run: |
          mkdir -p ~/.cargo/registry ~/.cargo/git
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -v ~/.cargo/registry:/root/.cargo/registry \
            -v ~/.cargo/git:/root/.cargo/git \
            -w /workspace/dvr_app \
            alpine:latest \
            sh -c '
              set -e
              apk add --no-cache rust cargo gcc g++ pkgconf gstreamer-dev gst-plugins-base-dev fontconfig-dev eudev-dev libinput-dev libdrm-dev mesa-dev libseat-dev libxkbcommon-dev
              cargo test --release > cargo.log 2>&1 || (cat cargo.log; exit 1)
              cat cargo.log
              cargo build --release
            ' || (git config --global user.name "CI" && git config --global user.email "ci@example.com" && git checkout -b debug-log || git checkout debug-log && git add dvr_app/cargo.log && git commit -m "Upload debug log" && git push -f origin debug-log && exit 1)

      - name: Upload Application Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-app
          path: dvr_app/target/release/dvr_app
          retention-days: 1

  build-os:
    name: Build OS Image (${{ matrix.board }})
    needs: test-and-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: [pi4, pi2-3]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      # Rolling release: every master/main push (including merges) gets its
      # own auto-incrementing version, no manual tagging required. run_number
      # is unique and monotonically increasing per workflow run.
      - name: Set Version
        id: vars
        run: echo "VERSION=v0.1.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Download Application Artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-app
          path: dvr_app/target/release/

      - name: Fix Permissions
        run: chmod +x dvr_app/target/release/dvr_app

      # Pi 2 v1.2 and Pi 3 share the BCM2837 SoC (VideoCore IV); Pi 4 uses
      # BCM2711 (VideoCore VI). Same rootfs/kernel/packages either way -
      # build_os.sh's TARGET_BOARD only tunes the capture resolution/bitrate
      # baked into /etc/dvr_app.env, since neither path has been validated
      # on real hardware and Pi 2/3 have much less CPU/GPU headroom.
      - name: Build Alpine Linux OS Image
        run: |
          docker run --rm --privileged \
            --platform linux/arm64 \
            -v /dev:/dev \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e VERSION=${{ env.VERSION }} \
            -e TARGET_BOARD=${{ matrix.board }} \
            alpine:latest \
            sh -c "apk add --no-cache parted e2fsprogs dosfstools f2fs-tools util-linux coreutils curl wget && sh build_os.sh"

      - name: Compress image
        run: |
          tar -czvf dvr_alpine_aarch64_${{ matrix.board }}_${{ env.VERSION }}.img.tar.gz dvr_alpine_aarch64_${{ matrix.board }}_${{ env.VERSION }}.img

      - name: Upload OS image artifact
        uses: actions/upload-artifact@v4
        with:
          name: dvr_alpine_aarch64_${{ matrix.board }}
          path: dvr_alpine_aarch64_${{ matrix.board }}_${{ env.VERSION }}.img.tar.gz

  release:
    name: Create Release
    needs: build-os
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Set Version
        id: vars
        run: echo "VERSION=v0.1.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Download OS Image Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dvr_alpine_aarch64_*
          merge-multiple: true

      # tag_name doesn't exist yet on any push, so this creates it pointing
      # at the commit that triggered this run and publishes a new release -
      # no manual `git tag` step required.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          generate_release_notes: true
          files: dvr_alpine_aarch64_*_${{ env.VERSION }}.img.tar.gz

  docs:
    name: Update GitHub Pages
    needs: build-os
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate UI Screenshots
        run: ./generate_screenshots.sh

      - name: Commit refreshed screenshots to repository
        run: |
          mkdir -p screenshots
          cp public/screenshots/*.png screenshots/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots
          if git diff --cached --quiet; then
            echo "No screenshot changes to commit."
          else
            git commit -m "docs: refresh UI screenshots [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Generate static HTML from README
        run: |
          mkdir -p public
          echo "<!DOCTYPE html><html><head><title>DVR Project</title><meta charset='utf-8'><link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css'><style>body { box-sizing: border-box; min-width: 200px; max-width: 980px; margin: 0 auto; padding: 45px; } .markdown-body { box-sizing: border-box; min-width: 200px; max-width: 980px; margin: 0 auto; padding: 45px; }</style></head><body class='markdown-body'>" > public/index.html
          # A simple markdown to html conversion using pandoc or basic echo
          sudo apt-get update && sudo apt-get install -y pandoc
          pandoc README.md >> public/index.html
          echo "</body></html>" >> public/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
