name: Build OS Image

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set Version
        id: vars
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "VERSION=${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi

      - name: Compile Rust App (aarch64)
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace/dvr_app \
            alpine:latest \
            sh -c "apk add --no-cache rust cargo gcc g++ pkgconf gstreamer-dev gst-plugins-base-dev fontconfig-dev && cargo build --release"

      - name: Build Alpine Linux OS Image
        run: |
          docker run --rm --privileged \
            --platform linux/arm64 \
            -v /dev:/dev \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e VERSION=${{ env.VERSION }} \
            alpine:latest \
            sh -c "apk add --no-cache parted e2fsprogs dosfstools util-linux coreutils curl wget && sh build_os.sh"

      - name: Compress image
        run: |
          tar -czvf dvr_alpine_aarch64_${{ env.VERSION }}.img.tar.gz dvr_alpine_aarch64_${{ env.VERSION }}.img

      - name: Upload OS image artifact
        uses: actions/upload-artifact@v4
        with:
          name: dvr_alpine_aarch64
          path: dvr_alpine_aarch64_${{ env.VERSION }}.img.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dvr_alpine_aarch64_${{ env.VERSION }}.img.tar.gz
