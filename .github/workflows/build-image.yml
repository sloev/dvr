name: Build DVR image

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# One build at a time; a newer push cancels the in-flight build.
concurrency:
  group: build-image
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  preview:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-pil fonts-dejavu-core xvfb scrot xdotool

      - name: Generate previews
        run: ./generate_preview.sh

      - name: Upload preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ui-previews
          path: previews/*.png

  build:
    needs: preview
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache || true
          df -h /

      - name: Download preview artifacts
        uses: actions/download-artifact@v4
        with:
          name: ui-previews
          path: previews

      - name: Build custom image (Mutation buildchain)
        run: |
          sudo bash build/build.sh
        
      - name: Collect artifacts
        id: collect
        run: |
          set -e
          OUT="dvr-latest-armhf.img.xz"
          mkdir -p out
          cp "$OUT" "out/${OUT}"
          ( cd out && sha256sum "${OUT}" > "${OUT}.sha256" )
          cp previews/*.png out/ 2>/dev/null || true
          ls -lh out
          echo "name=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Publish rolling release
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete rolling -y || true
          git push --delete origin refs/tags/rolling || true
          gh release create rolling \
            --title "Rolling Build" \
            --notes "Automated continuous build from master branch. Flash with Raspberry Pi Imager." \
            --prerelease \
            out/${{ steps.collect.outputs.name }} \
            out/${{ steps.collect.outputs.name }}.sha256 \
            out/*.png
