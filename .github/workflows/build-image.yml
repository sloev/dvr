name: Build DVR image

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# One build at a time; a newer push cancels the in-flight build.
concurrency:
  group: build-image
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  preview:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('generate_preview.sh') }}

      - name: Install dependencies
        run: |
          sudo rm -f /etc/apt/apt.conf.d/docker-clean
          sudo apt-get update
          sudo apt-get install -y --download-only python3-tk python3-pil fonts-dejavu-core xvfb scrot xdotool
          sudo apt-get install -y python3-tk python3-pil fonts-dejavu-core xvfb scrot xdotool

      - name: Generate previews
        run: ./generate_preview.sh

      - name: Prepare APT cache for save
        if: always()
        run: sudo chmod -R a+rX /var/cache/apt/archives || true

      - name: Upload preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ui-previews
          path: previews/*.png

  build:
    needs: preview
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download preview artifacts
        uses: actions/download-artifact@v4
        with:
          name: ui-previews
          path: previews

      - name: Cache RaspiOS Base Image
        uses: actions/cache@v4
        with:
          path: base.img.xz
          key: base-img-${{ hashFiles('build/build.sh') }}
          restore-keys: |
            base-img-

      - name: Download RaspiOS Base Image
        run: |
          IMG_URL="https://downloads.raspberrypi.com/raspios_lite_armhf/images/raspios_lite_armhf-2024-03-15/2024-03-15-raspios-bookworm-armhf-lite.img.xz"
          if [ ! -f "base.img.xz" ]; then
              echo "==> Downloading RaspiOS Lite..."
              wget -qO "base.img.xz" "$IMG_URL"
          fi

      - name: Build custom image (Mutation buildchain)
        run: |
          sudo bash build/build.sh
        
      - name: Collect artifacts
        id: collect
        run: |
          set -e
          OUT="dvr-latest-armhf.img.xz"
          mkdir -p out
          cp "$OUT" "out/${OUT}"
          ( cd out && sha256sum "${OUT}" > "${OUT}.sha256" )
          
          # Cachebusting: Add short SHA to preview filenames
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          for f in previews/preview_*.png; do
            if [ -f "$f" ]; then
              base=$(basename "$f" .png)
              # Remove old cachebusters if present
              clean_base=$(echo "$base" | sed -E 's/_[0-9a-f]{7}$//')
              cp "$f" "out/${clean_base}_${SHORT_SHA}.png"
            fi
          done
          
          # Update references in README and index.html
          sed -i -E "s/(preview_[a-z_]+)(_[0-9a-f]{7})?\.png/\1_${SHORT_SHA}.png/g" README.md docs/index.html || true
          
          # Commit and push changes to master
          if [[ "${{ github.ref }}" == "refs/heads/master" || "${{ github.ref }}" == "refs/heads/main" ]]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md docs/index.html
            git commit -m "ci: update preview cachebusters [skip ci]" || true
            git push origin HEAD:${GITHUB_REF} || true
          fi
          
          ls -lh out
          echo "name=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Publish rolling release
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete rolling -y || true
          git push --delete origin refs/tags/rolling || true
          gh release create rolling \
            --title "Rolling Build" \
            --notes "Automated continuous build from master branch. Flash with Raspberry Pi Imager." \
            --prerelease \
            out/${{ steps.collect.outputs.name }} \
            out/${{ steps.collect.outputs.name }}.sha256 \
            out/*.png

  pages:
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Checkout the latest commit which includes the cachebuster updates
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'
      - uses: actions/deploy-pages@v4
        id: deployment
